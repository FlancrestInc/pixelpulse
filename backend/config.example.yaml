server:
  host: "0.0.0.0"
  port: 8000

sky_driver:
  mode: "clock"         # clock | cycle | signal
  cycle_minutes: 10

signals:
  - id: "cpu_load"
    adapter: "system"
    metric: "cpu_percent"
    interval: 2

  - id: "memory_used"
    adapter: "system"
    metric: "memory_used"
    interval: 5

  - id: "weather_text"
    adapter: "weather"
    units: "fahrenheit"
    interval: 600

  - id: "news_ticker"
    adapter: "rss_feed"
    feeds:
      - url: "https://example.com/rss.xml"
        name: "Example Feed"
    interval: 300

  - id: "http_requests"
    adapter: "webhook"
    path: "/hooks/http-requests"
    type: "rate"
    value_key: "value"
    interval: 1

  - id: "active_streams"
    adapter: "shell"
    command: "echo 3"
    type: "gauge"
    max_value: 10
    interval: 10
