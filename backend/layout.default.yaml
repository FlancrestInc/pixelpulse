plots:
  - plot_id: main_1
    building: windmill
    style: classic_wood
    signal: cpu_load
    valve:
      range_min: 0.0
      range_max: 1.0
      alert_threshold: 0.85
      label: CPU Load

  - plot_id: main_2
    building: water_tower
    style: steel_municipal
    signal: memory_used
    valve:
      range_min: 0.0
      range_max: 1.0
      alert_threshold: 0.90
      label: Memory Used

  - plot_id: mid_1
    building: bus_stop
    style: classic_shelter
    signal: weather_text
    valve:
      label: Weather
